<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom in javascript</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        nav{
            height: 80px;
            color:white;
            background-color: #212121;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        nav > ul{
            display: flex;
            gap:20px;
            list-style: none;
        }

        nav > ul > li{
            font-size: 18px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
        }
        
        nav > button{
            padding: 10px 25px;
            border: none;
            background-color: orangered;
            border-radius: 10px;
            color:white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .main{
            padding: 20px 0px;
            min-height: 300px;
            background-color: lightcoral;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            align-items: center;
             gap:20px;
        }

        .main > .card{
            height: 200px;
            width: 350px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 3px 4px 5px rgba(0,0,0,0.8);
            text-align: center;
            padding-top: 14px;
         
        }

        .dark{
         background-color: black;
         color: aliceblue;
         text-align: center;
        }

        .circle{
            height:200px;
            width:200px;
            background-color: yellow;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>
<body>

    <nav>
        <h2 id="logo">DomLogo</h2>

        <ul>
            <li>home</li>
            <li>about</li>
            <li>contact</li>
        </ul>

        <button>login</button>
    </nav>
    

    <div class="main">

        <div class="card">
             <h2> i am card1</h2>
        </div>

        <div class="card">
             <h2> i am card2</h2>
        </div>
        <div class="card">
             <h2> i am card3</h2>
        </div>

        <section>
            <h2> i am section</h2>
            <p>how are you</p>
        </section>

    </div>

    <article>
        <h1>welcome to dom section in js</h1>
        <p>here we will learn how to add functionality in the page </p>
        <button>get started</button>
    </article>


    <script src="./dom1.js"></script>
</body>
</html>
